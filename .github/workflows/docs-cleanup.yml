name: Daily Documentation Cleanup

permissions:
  contents: write
  pages: write
  id-token: write

on:
  workflow_call:
    inputs:
      deployment_type:
        description: "Type of deployment: legacy or workflow"
        type: string
        required: false
        default: "workflow"
    secrets:
      token:
        description: "GitHub Token"
        required: true

jobs:
  docs-cleanup:
    name: Cleanup old documentation
    runs-on: ${{ vars.REPO_RUNNER_LABELS && fromJSON(vars.REPO_RUNNER_LABELS) || 'ubuntu-latest' }}
    permissions:
      pages: write
      contents: write
      id-token: write
    steps:
      - name: Checkout repository root for deploy context
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: gh-pages
          fetch-depth: 0

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: gh-pages
          fetch-depth: 0
          path: gh-pages-cleanup

      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install -y gh jq

      - name: Select authentication token
        env:
          PASSED_TOKEN: ${{ secrets.token }}
          FALLBACK_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "$PASSED_TOKEN" ]]; then
            echo "Using caller-provided token from workflow_call secret 'token'."
            echo "::add-mask::$PASSED_TOKEN"
            echo "GH_TOKEN=$PASSED_TOKEN" >> "$GITHUB_ENV"
            echo "GH_TOKEN_SOURCE=workflow_call secret 'token'" >> "$GITHUB_ENV"
          elif [[ -n "$FALLBACK_TOKEN" ]]; then
            echo "No workflow_call secret 'token' was provided. Falling back to github.token for this workflow run."
            echo "::add-mask::$FALLBACK_TOKEN"
            echo "GH_TOKEN=$FALLBACK_TOKEN" >> "$GITHUB_ENV"
            echo "GH_TOKEN_SOURCE=github.token" >> "$GITHUB_ENV"
          else
            echo "Neither workflow_call secret 'token' nor github.token is available." >&2
            exit 1
          fi

      - name: Cleanup old documentation
        working-directory: gh-pages-cleanup
        run: |
          echo "Authenticating GitHub CLI using: $GH_TOKEN_SOURCE"
          gh auth status

          ACTIVE_BRANCHES=$(gh api --paginate repos/${{ github.repository }}/branches --jq '.[].name')
          OPEN_PRS=$(gh api --paginate repos/${{ github.repository }}/pulls --jq '.[].number' | sed 's/^/pr-/')
          TAGS=$(gh api --paginate repos/${{ github.repository }}/tags --jq '.[].name')
          VALID_ENTRIES=$(echo -e "$ACTIVE_BRANCHES\n$OPEN_PRS\n$TAGS")
          CURRENT_FOLDERS=$(find . -maxdepth 1 -type d -not -name '.' -not -path './.*' -exec basename {} \;)

          if [[ -f versions.json ]]; then
            jq '.' versions.json > versions_tmp.json
          else
            echo "[]" > versions_tmp.json
          fi

          for FOLDER in $CURRENT_FOLDERS; do
            if ! echo "$VALID_ENTRIES" | grep -Fxq "$FOLDER"; then
              echo "Removing $FOLDER"
              rm -rf "$FOLDER"
              jq --arg ver "$FOLDER" 'map(select(.version != $ver))' versions_tmp.json > tmp.json && mv tmp.json versions_tmp.json
            fi
          done

          jq '[.[] | select((.version | IN($folders[])))]' --argjson folders "$(ls -1 | jq -R -s -c 'split("\n")[:-1]')" versions_tmp.json > versions_tmp_clean.json

          jq --arg repo "${{ github.repository }}" \
             --arg owner "${{ github.repository_owner }}" \
             '[.[] | select(.version != "main")]
              | sort_by(.version)
              | [{"version":"main",
                  "url":("https://" + $owner + ".github.io/" + ($repo | split("/")[1]) + "/main/")}]
              + .' \
             versions_tmp_clean.json > versions.json

          rm versions_tmp.json versions_tmp_clean.json

      - name: Commit and Push Changes
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: gh-pages-cleanup
          commit-message: "Daily cleanup of outdated documentation"
